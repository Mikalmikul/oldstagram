<html>
    <head>
        <link rel="stylesheet" href="index.css">
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Source+Sans+3:ital,wght@0,200..900;1,200..900&display=swap" rel="stylesheet">
    </head>
    <body>
        
            <nav>
                <img src="/images/logo.png">
            </nav>
            <main>
                <section id="user-info-el">
                    <img id="avatar-img" src="/images/avatar-vangogh.jpg">
                    <div class="name-location-el">
                        <h1 id="name-el">Vincent van Gogh</h1>
                        <h2 id="location-el">Zundert, Netherlands</h2>
                    </div>
                </section>
                
                <section id="post-el">
                    <button id="prev-btn">❮</button>
                    <img id="post-img" src="/images/post-vangogh.jpg">
                    <button id="next-btn">❯</button>
                </section>
                
                <div class="icon">
                    <img id="heart-btn" class="icon-style" src="/images/icon-heart.png">
                    <img id="cmnt-btn" class="icon-style" src="/images/icon-comment.png">
                    <img id="dm-btn" class="icon-style" src="/images/icon-dm.png">
                </div>
                
                <h3 id="like-counter-el" class="like-counter-el">21 likes</h3>

                <div class="user-comment">    
                    <p id="username-el">vincey1853</p>
                    <p id="comment-el">just took a few mushrooms lol</p>
                </div>
                
            </main>
        <script src="index.js"></script>
    </body>
</html>
